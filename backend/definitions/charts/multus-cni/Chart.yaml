apiVersion: v2
name: multus-cni
version: 4.2.4
appVersion: "v4.2.4"
description: |
  Multus CNI (thick plugin variant).

  Upstream ships only a static daemonset YAML at
  deployments/multus-daemonset-thick.yml without any Helm chart. We
  vendor that file under templates/ with two local edits:

    * image refs templatized as
      `{{ .Values.image.repository }}:{{ .Values.image.tag }}` (with
      defaults `ghcr.io/k8snetworkplumbingwg/multus-cni:v4.2.4-thick`)
      so the image can be pinned away from the upstream `snapshot-thick`
      mutable rolling tag — that tag was responsible for OOMKills when
      a rebuild grew the binary past the 50Mi limit.

    * kube-multus daemon container resources templatized as
      `{{ toYaml .Values.pod.resources }}` with defaults at
      requests cpu=100m/memory=128Mi, limits cpu=200m/memory=256Mi.
      The upstream YAML hard-coded 50Mi which the live binary now
      consistently exceeds during chart deploys + RBAC cache warm-up.

  Source: https://github.com/k8snetworkplumbingwg/multus-cni/tree/v4.2.4/deployments
type: application
home: https://github.com/k8snetworkplumbingwg/multus-cni
sources:
  - https://github.com/k8snetworkplumbingwg/multus-cni
keywords:
  - cni
  - multus
maintainers:
  - name: k8s-bootstrap
