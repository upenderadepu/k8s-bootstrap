{{- /*
  driver-config ConfigMap — read by the CSI controller Deployment.
  Source: kubevirt/csi-driver deploy/tenant/base/deploy.yaml
*/}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: driver-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: kubevirt-csi-driver
data:
  infraClusterNamespace: {{ .Values.infraClusterNamespace | default "" | quote }}
  infraClusterLabels: {{ .Values.infraClusterLabels | default "csi-driver/cluster=tenant" | quote }}
  infraStorageClassEnforcement: {{ .Values.infraStorageClassEnforcement | default "" | quote }}
{{- /*
  CSI controller Deployment — runs in the tenant control plane.
  Source: kubevirt/csi-driver deploy/controller-tenant/base/deploy.yaml
*/}}
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: kubevirt-csi-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: kubevirt-csi-driver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubevirt-csi-driver
  template:
    metadata:
      labels:
        app: kubevirt-csi-driver
    spec:
      enableServiceLinks: false
      serviceAccount: kubevirt-csi-controller-sa
      priorityClassName: system-cluster-critical
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: csi-driver
          image: {{ .Values.images.csiDriver | default "quay.io/kubevirt/kubevirt-csi-driver:latest" }}
          imagePullPolicy: IfNotPresent
          args:
            - "--endpoint=$(CSI_ENDPOINT)"
            - "--infra-cluster-namespace=$(INFRACLUSTER_NAMESPACE)"
            - "--infra-cluster-kubeconfig=/var/run/secrets/infracluster/kubeconfig"
            - "--infra-cluster-labels=$(INFRACLUSTER_LABELS)"
            - "--run-node-service=false"
            - "--run-controller-service=true"
            - "--v=5"
          ports:
            - name: healthz
              containerPort: 10301
              protocol: TCP
          env:
            - name: CSI_ENDPOINT
              value: unix:///var/lib/csi/sockets/pluginproxy/csi.sock
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: INFRACLUSTER_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: driver-config
                  key: infraClusterNamespace
            - name: INFRACLUSTER_LABELS
              valueFrom:
                configMapKeyRef:
                  name: driver-config
                  key: infraClusterLabels
            - name: INFRA_STORAGE_CLASS_ENFORCEMENT
              valueFrom:
                configMapKeyRef:
                  name: driver-config
                  key: infraStorageClassEnforcement
                  optional: true
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
            - name: infracluster
              mountPath: /var/run/secrets/infracluster
          resources:
            requests:
              memory: 50Mi
              cpu: 10m
        - name: csi-provisioner
          image: {{ .Values.images.provisioner | default "quay.io/openshift/origin-csi-external-provisioner:4.22.0" }}
          args:
            - "--csi-address=$(ADDRESS)"
            - "--default-fstype=ext4"
            - "--v=5"
            - "--timeout=3m"
            - "--retry-interval-max=1m"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
          resources:
            requests:
              memory: 50Mi
              cpu: 10m
        - name: csi-attacher
          image: {{ .Values.images.attacher | default "quay.io/openshift/origin-csi-external-attacher:4.22.0" }}
          args:
            - "--csi-address=$(ADDRESS)"
            - "--v=5"
            - "--timeout=3m"
            - "--retry-interval-max=1m"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
          resources:
            requests:
              memory: 50Mi
              cpu: 10m
        - name: csi-liveness-probe
          image: {{ .Values.images.livenessProbe | default "quay.io/openshift/origin-csi-livenessprobe:4.22.0" }}
          args:
            - "--csi-address=/csi/csi.sock"
            - "--probe-timeout=3s"
            - "--health-port=10301"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            requests:
              memory: 50Mi
              cpu: 10m
        - name: csi-snapshotter
          image: {{ .Values.images.snapshotter | default "quay.io/openshift/origin-csi-external-snapshotter:4.22.0" }}
          args:
            - "--v=3"
            - "--csi-address=/csi/csi.sock"
            - "--timeout=3m"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            requests:
              memory: 20Mi
              cpu: 10m
        - name: csi-resizer
          image: {{ .Values.images.resizer | default "quay.io/openshift/origin-csi-external-resizer:4.22.0" }}
          args:
            - "--csi-address=/csi/csi.sock"
            - "--v=5"
            - "--timeout=3m"
            - "--handle-volume-inuse-error=false"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources:
            requests:
              cpu: 10m
              memory: 20Mi
          securityContext:
            capabilities:
              drop:
                - ALL
      volumes:
        - name: socket-dir
          emptyDir: {}
        - name: infracluster
          secret:
            secretName: {{ .Values.infraClusterKubeconfigSecret.name | default "infra-cluster-credentials" }}
