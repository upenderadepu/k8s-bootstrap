{{- /*
  StorageClass(es) — one per entry in .Values.storageClasses.
  Source: kubevirt/csi-driver deploy/tenant/base/deploy.yaml
*/}}
{{- range .Values.storageClasses }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .name }}
  labels:
    app: kubevirt-csi-driver
  {{- if .isDefault }}
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
  {{- end }}
provisioner: csi.kubevirt.io
parameters:
  infraStorageClassName: {{ .infraStorageClassName | default "" | quote }}
  bus: {{ .bus | default "scsi" | quote }}
{{- end }}
