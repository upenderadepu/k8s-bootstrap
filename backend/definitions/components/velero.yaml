id: velero
name: Velero
description: Backup and disaster recovery for Kubernetes clusters and persistent volumes
category: backup
categoryName: Backup
categoryDescription: Backup and disaster recovery
icon: 🛟
priority: 60
docsUrl: https://velero.io/docs/
chartType: upstream
namespace: o0-velero
releaseName: velero
createNamespace: true
podSecurityEnforce: privileged  # Required for node-agent (hostPath volumes)
upstream:
  repository: https://vmware-tanzu.github.io/helm-charts
  chartName: velero
  version: "11.3.2"

dependsOn:
  - velero-crds

defaultValues:
  initContainers:
    - name: velero-plugin-for-aws
      image: mirror.gcr.io/velero/velero-plugin-for-aws:v1.12.1
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - mountPath: /target
          name: plugins
  configuration:
    # BSL/VSL disabled until S3 credentials are configured
    backupStorageLocation: []
    volumeSnapshotLocation: []
    features: EnableCSI
    defaultItemOperationTimeout: 24h
  credentials:
    useSecret: false
  backupsEnabled: false
  snapshotsEnabled: false
  deployNodeAgent: true
  nodeAgent:
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1024Mi
  image:
    repository: mirror.gcr.io/velero/velero
    tag: v1.17.1
    pullPolicy: IfNotPresent
  upgradeCRDs: false
  kubectl:
    image:
      repository: registry.k8s.io/kubectl
      tag: "v1.32.0"
  metrics:
    enabled: true
    scrapeInterval: 30s
    scrapeTimeout: 10s
    podAnnotations:
      prometheus.io/scrape: 'true'
      prometheus.io/port: '8085'
      prometheus.io/path: /metrics
    serviceMonitor:
      autodetect: true
      enabled: true
  rbac:
    create: true
    clusterAdministrator: true
    clusterAdministratorName: cluster-admin
  serviceAccount:
    server:
      create: true
      automountServiceAccountToken: true
jsonSchema:
  type: object
  properties:
    configuration:
      type: object
      title: Configuration
      properties:
        provider:
          type: string
          title: Cloud Provider
          enum:
          - aws
          - gcp
          - azure
          - ''
        backupStorageLocation:
          type: array
          title: Backup Storage Location
          items:
            type: object
            properties:
              name:
                type: string
                default: default
              provider:
                type: string
                enum:
                - aws
                - gcp
                - azure
              bucket:
                type: string
                title: Bucket Name
              prefix:
                type: string
                title: Prefix
              config:
                type: object
                title: Provider Config
                properties:
                  region:
                    type: string
                    title: Region
                  s3ForcePathStyle:
                    type: boolean
                    title: S3 Force Path Style
                  s3Url:
                    type: string
                    title: S3 URL (MinIO)
    credentials:
      type: object
      title: Credentials
      properties:
        useSecret:
          type: boolean
          title: Use Credentials Secret
          default: true
        existingSecret:
          type: string
          title: Existing Secret
        secretContents:
          type: object
          title: Secret Contents
          properties:
            cloud:
              type: string
              title: Cloud Credentials
    schedules:
      type: object
      title: Backup Schedules
      additionalProperties:
        type: object
        properties:
          schedule:
            type: string
            title: Cron Schedule
          template:
            type: object
            properties:
              ttl:
                type: string
              includedNamespaces:
                type: array
                items:
                  type: string
    initContainers:
      type: array
      title: Plugin Init Containers
      items:
        type: object
        properties:
          name:
            type: string
          image:
            type: string
          volumeMounts:
            type: array
            items:
              type: object
    serviceMonitor:
      type: object
      properties:
        enabled:
          type: boolean
          title: Enable ServiceMonitor
          default: false
uiSchema:
  configuration:
    provider:
      ui:widget: select
      ui:placeholder: Select cloud provider
    backupStorageLocation:
      items:
        bucket:
          ui:placeholder: my-velero-bucket
        config:
          ui:collapsed: true
          region:
            ui:placeholder: us-east-1
          s3Url:
            ui:placeholder: https://minio.example.com
            ui:help: For MinIO or S3-compatible storage
  credentials:
    secretContents:
      cloud:
        ui:widget: textarea
        ui:placeholder: '[default]

          aws_access_key_id=...

          aws_secret_access_key=...

          '
    existingSecret:
      ui:help: If set, secretContents is ignored
  schedules:
    ui:collapsed: true
    ui:help: "Example schedule:\ndaily-backup:\n  schedule: \"0 2 * * *\"\n  template:\n\
      \    ttl: \"168h\"\n    includedNamespaces: [\"*\"]\n"
  initContainers:
    ui:collapsed: true
    ui:help: 'Common plugins:

      - mirror.gcr.io/velero/velero-plugin-for-aws:v1.9.0

      - mirror.gcr.io/velero/velero-plugin-for-gcp:v1.9.0

      - mirror.gcr.io/velero/velero-plugin-for-microsoft-azure:v1.9.0

      '
