# KubeVirt CSI Driver — tenant persistent storage
#
# This is the canonical CAPK storage pattern (Pattern B):
#
#   [tenant pod PVC]
#     → [tenant CSI controller in tenant CP]   (this addon)
#     → [host CDI: DataVolume]
#     → [LINSTOR/ZFS on host]
#     → [KubeVirt hotplug]
#     → [worker VM /dev/vdX]
#
# Replaces the broken "Piraeus inside tenant" addon (linstor-cluster's
# old tenantAddon block) — tenant clusters don't have Piraeus CRDs nor
# the kernel modules required to host DRBD targets, so the only viable
# path is to forward PVCs to the host.
#
# Configuration of the host-side secret (`infra-cluster-credentials`),
# ServiceAccount RBAC, and KubevirtCluster wiring lives in the kubevirt_ui
# backend — see `tenants_storage._create_csi_infrastructure_resources`.
# This catalog entry just makes the tenant-CP HelmRelease auto-installable
# alongside other tenant addons (cert-manager, ingress-nginx, …).

id: kubevirt-csi-driver
name: KubeVirt CSI Driver
description: |
  Tenant CSI driver that forwards PersistentVolumeClaims to host CDI
  DataVolumes (kubevirt-csi pattern). Required for tenant pods to mount
  persistent volumes backed by host storage.
category: storage
categoryName: Storage
categoryDescription: Storage solutions
icon: "💾"
priority: 47
docsUrl: https://github.com/kubevirt/csi-driver

# Upstream kubevirt/csi-driver ships only Kustomize overlays — no Helm
# chart. The wrapper chart that materializes them is generated as a
# `custom` chart with inline templates in this repo (see `templates`
# below). When the upstream project ships a Helm chart we'll flip this
# back to `chartType: upstream`.
chartType: custom
namespace: kube-system
releaseName: kubevirt-csi-driver
createNamespace: false
timeout: 10m

defaultValues:
  # Container images (kubevirt-csi-driver publishes only `latest`;
  # all OpenShift CSI sidecars pinned to 4.22 release set).
  images:
    csiDriver: quay.io/kubevirt/kubevirt-csi-driver:latest
    provisioner: quay.io/openshift/origin-csi-external-provisioner:4.22.0
    attacher: quay.io/openshift/origin-csi-external-attacher:4.22.0
    snapshotter: quay.io/openshift/origin-csi-external-snapshotter:4.22.0
    resizer: quay.io/openshift/origin-csi-external-resizer:4.22.0
    livenessProbe: quay.io/openshift/origin-csi-livenessprobe:4.22.0
    nodeDriverRegistrar: quay.io/openshift/origin-csi-node-driver-registrar:4.22.0

  # The kubeconfig Secret created by the kubevirt_ui backend on the HOST
  # cluster and replicated into the tenant CP via the addon flow.
  infraClusterKubeconfigSecret:
    name: infra-cluster-credentials
    key: kubeconfig

  # Namespace on the HOST cluster where DataVolumes get created.
  # Templated to `tenant-<name>` by the kubevirt_ui addon flow.
  infraClusterNamespace: ""

  # Labels applied to host-cluster resources created by the driver.
  infraClusterLabels: "csi-driver/cluster=tenant"

  # Optional: restrict which host StorageClass the driver may use.
  infraStorageClassEnforcement: ""

  # Per-tenant default StorageClass name created INSIDE the tenant CP.
  # Maps tenant PVCs → host SC via the CSI driver's infraStorageClassName.
  storageClasses:
    - name: kubevirt
      isDefault: true
      infraStorageClassName: ""    # filled per-tenant (req.storage_class or cluster default)
      bus: scsi

  # VolumeSnapshotClass — requires external-snapshotter CRDs (separate component).
  snapshots:
    enabled: false

# --- Tenant Addon Configuration ---
# Auto-included by the tenant create flow when `enable_storage=True`.
# The kubevirt_ui backend sets `infraClusterNamespace` and the storage class
# `infraStorageClassName` parameter from `TenantCreateRequest`.
tenantAddon: true
tenantConfig:
  order: 5
  namespace: kube-system
  discovery_type: storage
  required: false
  default: false  # opt-in via the wizard's "Enable storage" toggle
  defaultValues:
    infraClusterKubeconfigSecret:
      name: infra-cluster-credentials
      key: kubeconfig
    infraClusterNamespace: ""
    infraClusterLabels: "csi-driver/cluster=tenant"
    infraStorageClassEnforcement: ""
    storageClasses:
      - name: kubevirt
        isDefault: true
        infraStorageClassName: ""
        bus: scsi
    snapshots:
      enabled: false
  parameters:
    - id: INFRA_CLUSTER_NAMESPACE
      name: Host tenant namespace
      type: string
      default: ""
      options: []
      auto_discover: false
      valuesPath: "infraClusterNamespace"
    - id: INFRA_STORAGE_CLASS_NAME
      name: Host StorageClass
      type: string
      default: ""
      options: []
      auto_discover: true
      valuesPath: "storageClasses.0.infraStorageClassName"

# Chart templates live in definitions/charts/kubevirt-csi-driver/templates/
# (controller.yaml, csidriver.yaml, rbac.yaml, node.yaml, storageclass.yaml,
# snapshot-class.yaml, NOTES.txt).  No inline templates needed here.
