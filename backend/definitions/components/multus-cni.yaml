# Multus CNI - Multi-Network Support
# Enables attaching multiple network interfaces to Pods and VMs
# Works with any primary CNI (Cilium, Kube-OVN, Calico, etc.)

id: multus-cni
name: Multus CNI
description: Multi-network CNI plugin - enables attaching multiple network interfaces to Pods and VMs
category: networking
categoryName: Networking
categoryDescription: CNI plugins and advanced networking
icon: "🔀"
priority: 30
docsUrl: https://github.com/k8snetworkplumbingwg/multus-cni

# Upstream ships only a static daemonset YAML (no Helm chart). We vendor that
# file under `definitions/charts/multus-cni/templates/` with two local edits:
#   * image tag pinned from `snapshot-thick` (mutable rolling tag) to a
#     specific release — the rolling tag was responsible for OOMKills when
#     an upstream rebuild pushed the thick binary past the chart's old 50Mi.
#   * image + resources templatized as `.Values.image` / `.Values.pod.resources`
#     so the defaultValues block below actually flows through to the Pod spec
#     (the upstream YAML was raw, so values from HelmRelease were ignored).
chartType: custom
namespace: o0-multus
createNamespace: true
podSecurityEnforce: privileged  # Required for CNI plugin install (hostPath, privileged)
timeout: 5m

version: "4.2.4"
appVersion: "v4.2.4"

# No dependencies - Multus works with any primary CNI

defaultValues:
  # Image settings — must match the templated daemonset.yaml refs.
  image:
    repository: ghcr.io/k8snetworkplumbingwg/multus-cni
    tag: v4.2.4-thick

  # Pod settings — 128Mi requests / 256Mi limit chosen after observing
  # the thick binary peaking past 50Mi during chart deploys + RBAC cache
  # warm-up. CPU limit raised to 200m for the same reason.
  pod:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

jsonSchema:
  type: object
  properties:
    image:
      type: object
      title: Image Settings
      properties:
        repository:
          type: string
          title: Image Repository
          default: "ghcr.io/k8snetworkplumbingwg/multus-cni"
        tag:
          type: string
          title: Image Tag
          description: Use -thick suffix for thick plugin mode
          default: "v4.2.4-thick"
    pod:
      type: object
      title: Pod Resources
      properties:
        resources:
          type: object
          properties:
            requests:
              type: object
              properties:
                cpu:
                  type: string
                  default: "100m"
                memory:
                  type: string
                  default: "128Mi"
            limits:
              type: object
              properties:
                cpu:
                  type: string
                  default: "200m"
                memory:
                  type: string
                  default: "256Mi"

uiSchema:
  image:
    ui:collapsed: true
  pod:
    ui:collapsed: true
