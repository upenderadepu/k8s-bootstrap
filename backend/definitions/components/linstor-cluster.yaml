# Linstor Cluster - Storage Cluster Configuration
# Creates the actual DRBD/Linstor storage cluster
# Docs: https://piraeus.io/docs/stable/how-to/helm/

id: linstor-cluster
name: Linstor Cluster
description: Configure Linstor storage cluster - satellites, CSI driver, and HA controller
category: storage
categoryName: Storage
categoryDescription: Storage solutions
icon: "💿"
priority: 46
isInstance: true
instanceOf: piraeus-operator
multiInstance: false
requiresOperator: piraeus-operator
docsUrl: https://piraeus.io/docs/

chartType: upstream
namespace: o0-piraeus
releaseName: linstor-cluster
createNamespace: false
timeout: 15m

upstream:
  # OCI repository path includes chart name
  repository: oci://ghcr.io/piraeusdatastore/helm-charts/linstor-cluster
  chartName: linstor-cluster
  version: "1.1.1"

dependsOn:
  - piraeus-operator

defaultValues:
  # LinstorCluster CRD will be created
  linstorCluster:
    enabled: true
  
  # CSI Driver - uses Piraeus Operator to configure
  csiDriver:
    enabled: true
  
  # High Availability Controller for VMs
  haController:
    enabled: true

jsonSchema:
  type: object
  properties:
    linstorCluster:
      type: object
      title: Linstor Cluster
      properties:
        enabled:
          type: boolean
          title: Enable Cluster
          default: true
    csiDriver:
      type: object
      title: CSI Driver
      properties:
        enabled:
          type: boolean
          title: Enable CSI Driver
          default: true
    haController:
      type: object
      title: HA Controller
      properties:
        enabled:
          type: boolean
          title: Enable HA
          description: Automatic failover for VMs using DRBD
          default: true

uiSchema:
  linstorCluster:
    ui:collapsed: false

# --- Tenant Addon Configuration ---
# REMOVED — was offered as a tenant addon ("CSI-only Piraeus inside tenant"),
# but tenant clusters don't have Piraeus CRDs / kernel modules. Tenant
# persistent storage now goes through kubevirt-csi-driver, which forwards
# PVCs to the host cluster (where Piraeus actually lives). See the
# `kubevirt-csi-driver` component for the replacement addon.
#
# This component itself stays for the HOST cluster (operators still need to
# install/configure LinstorCluster on the underlying lab cluster) — only the
# `tenantAddon: true` flag is dropped.
